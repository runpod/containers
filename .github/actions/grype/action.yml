name: Grype
description: "Scan Docker images with Grype. For now it's report-only and doesn't fail the build, until we fix the vulnerabilities."

inputs:
  image-refs:
    description: "JSON array of image refs to scan"
    required: true
  max-parallel-scans:
    description: "Maximum number of Grype scans to run concurrently"
    required: false
    default: "2"

runs:
  using: composite
  steps:
    - name: Install Grype
      shell: bash
      run: |
        curl -fsSL https://github.com/anchore/grype/releases/download/v0.114.0/grype_0.114.0_linux_amd64.tar.gz \
          -o /tmp/grype.tar.gz
        tar xz -C /tmp -f /tmp/grype.tar.gz grype
        sudo mv /tmp/grype /usr/local/bin/grype
        grype --version

    - name: Scan
      shell: bash
      env:
        IMAGE_REFS: ${{ inputs.image-refs }}
        MAX_PARALLEL_SCANS: ${{ inputs.max-parallel-scans }}
      run: |
        set -uo pipefail
        mapfile -t refs < <(echo "${IMAGE_REFS}" | jq -r '.[]')
        if [ ${#refs[@]} -eq 0 ]; then
          echo "No image refs to scan"
          exit 1
        fi

        max_parallel="${MAX_PARALLEL_SCANS:-2}"
        if ! [[ "${max_parallel}" =~ ^[1-9][0-9]*$ ]]; then
          echo "Invalid max-parallel-scans='${max_parallel}', falling back to 2"
          max_parallel=2
        fi

        echo "Scanning ${#refs[@]} image(s), up to ${max_parallel} in parallel:"
        printf '  - %s\n' "${refs[@]}"

        tmpdir="$(mktemp -d)"

        scan_one() {
          local idx="$1" ref="$2"
          if grype "docker:${ref}" \
              --fail-on high \
              --only-fixed \
              --scope all-layers \
              -o table \
              -q > "${tmpdir}/${idx}.log" 2>&1; then
            echo 0 > "${tmpdir}/${idx}.rc"
          else
            echo 1 > "${tmpdir}/${idx}.rc"
          fi
        }

        # Launch scans, capping concurrency at ${max_parallel}.
        running=0
        for idx in "${!refs[@]}"; do
          scan_one "${idx}" "${refs[$idx]}" &
          running=$((running + 1))
          if [ "${running}" -ge "${max_parallel}" ]; then
            wait -n
            running=$((running - 1))
          fi
        done
        wait

        # Print each scan's output (grouped) and collect failures. A missing
        # rc file means the scan never completed and is treated as a failure.
        failed=()
        for idx in "${!refs[@]}"; do
          echo "::group::Grype — ${refs[$idx]}"
          cat "${tmpdir}/${idx}.log" 2>/dev/null || echo "(no output captured)"
          echo "::endgroup::"
          if [ "$(cat "${tmpdir}/${idx}.rc" 2>/dev/null)" != "0" ]; then
            failed+=("${refs[$idx]}")
          fi
        done

        if [ ${#failed[@]} -gt 0 ]; then
          echo "::error::Grype found CRITICAL/HIGH vulnerabilities in:"
          printf '  - %s\n' "${failed[@]}"
          # exit 1 # TODO: Uncomment this when we fix the vulnerabilities
        else
          echo "All images clean of CRITICAL/HIGH (fixed) vulnerabilities."
        fi
