name: Trivy
description: "Scan Docker images with Trivy"
inputs:
  bake-metadata:
    description: "The bake metadata to scan"
    required: true

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz \
          -o /tmp/trivy.tar.gz
        tar xz -C /tmp -f /tmp/trivy.tar.gz trivy
        sudo mv /tmp/trivy /usr/local/bin/trivy
        trivy --version

    - name: Scan
      shell: bash
      env:
        IMAGE_REFS: ${{ inputs.image-refs }}
      run: |
        set -uo pipefail
        mapfile -t refs < <(echo "${IMAGE_REFS}" | jq -r '.[]')
        if [ ${#refs[@]} -eq 0 ]; then
          echo "No image refs to scan"
          exit 1
        fi

        echo "Scanning ${#refs[@]} image(s):"
        printf '  - %s\n' "${refs[@]}"

        failed=()
        for ref in "${refs[@]}"; do
          echo "::group::Trivy — ${ref}"
          if ! trivy image \
              --timeout 30m \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              --ignore-unfixed \
              --pkg-types os,library \
              --format table \
              --no-progress \
              "${ref}"; then
            failed+=("${ref}")
          fi
          echo "::endgroup::"
        done

        if [ ${#failed[@]} -gt 0 ]; then
          echo "::error::Trivy found CRITICAL/HIGH vulnerabilities in:"
          printf '  - %s\n' "${failed[@]}"
          # exit 1 # TODO: Uncomment this when we fix the vulnerabilities
        fi
        echo "All images clean of CRITICAL/HIGH (fixed) vulnerabilities."
