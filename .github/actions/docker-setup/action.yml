name: 'Docker Setup'
description: 'Common Docker setup steps for Blacksmith builds'
inputs:
  dockerhub-username:
    description: 'Docker Hub username'
    required: true
  dockerhub-token:
    description: 'Docker Hub token'
    required: true
  max-parallelism:
    description: 'Maximum parallelism for Docker Build'
    required: false
    default: 8
outputs:
  is-production:
    description: 'Whether this is a production build'
    value: ${{ steps.build-type.outputs.is_production }}
  release-suffix:
    description: 'Release suffix for non-production builds'
    value: ${{ steps.env-vars.outputs.release_suffix }}

runs:
  using: 'composite'
  steps:
    - name: Clear space to remove unused folders
      shell: bash
      run: |
        rm -rf /usr/share/dotnet
        rm -rf /opt/ghc
        rm -rf "/usr/local/share/boost"
        rm -rf "$AGENT_TOOLSDIRECTORY"

    - name: Enable containerd image store
      shell: bash
      run: |
        set -euo pipefail
        sudo mkdir -p /etc/docker
        if [ -f /etc/docker/daemon.json ]; then
          sudo jq '. + {features: ((.features // {}) + {"containerd-snapshotter": true})}' \
            /etc/docker/daemon.json \
            | sudo tee /etc/docker/daemon.json.new > /dev/null
          sudo mv /etc/docker/daemon.json.new /etc/docker/daemon.json
        else
          echo '{"features":{"containerd-snapshotter":true}}' \
            | sudo tee /etc/docker/daemon.json > /dev/null
        fi
        sudo systemctl restart docker
        for _ in $(seq 1 30); do
          docker info > /dev/null 2>&1 && break
          sleep 1
        done

    - name: Verify containerd image store is active
      shell: bash
      run: |
        set -euo pipefail
        docker version --format 'Server: {{.Server.Version}}'
        if docker info --format '{{.DriverStatus}}' | grep -q 'io.containerd.snapshotter'; then
          echo "OK: containerd snapshotter is active"
        else
          echo "FAIL: containerd snapshotter is NOT active; load: true will be slow"
          docker info --format '{{.DriverStatus}}'
          exit 1
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Set up Docker Build
      uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba
      with:
        max-parallelism: ${{ inputs.max-parallelism }}

    - name: Inspect buildx builder
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::docker buildx ls"
        docker buildx ls
        echo "::endgroup::"
        echo "::group::docker buildx inspect --bootstrap"
        docker buildx inspect --bootstrap
        echo "::endgroup::"

    - name: Determine if this is a production build
      id: build-type
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "is_production=true" >> $GITHUB_OUTPUT
        else
          echo "is_production=false" >> $GITHUB_OUTPUT
        fi

    - name: Set Environment Variables
      id: env-vars
      if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dj/containers-v1'
      shell: bash
      run: |
        RAW_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF}}"
        BRANCH_NAME=$(echo "${RAW_BRANCH}" | sed 's/\//-/g')
        SUFFIX="-dev-${BRANCH_NAME}"
        echo "RELEASE=${SUFFIX}" >> $GITHUB_ENV
        echo "release_suffix=${SUFFIX}" >> $GITHUB_OUTPUT 