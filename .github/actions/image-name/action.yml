name: Image Names
description: "Extract pushed/loaded image refs from bake metadata as a JSON array"

inputs:
  bake-metadata:
    description: "Bake metadata JSON (steps.<bake>.outputs.metadata)"
    required: true

outputs:
  refs:
    description: "JSON array of image references (e.g. [\"docker.io/runpod/base:1.0.3-ubuntu2204\", ...])"
    value: ${{ steps.extract.outputs.refs }}

runs:
  using: composite
  steps:
    - id: extract
      shell: bash
      env:
        BAKE_METADATA: ${{ inputs.bake-metadata }}
      run: |
        set -euo pipefail
        REFS=$(echo "${BAKE_METADATA}" \
          | jq -c '[.[] | ."image.name"] | map(select(. != null)) | flatten | unique')
        echo "refs=${REFS}" >> "${GITHUB_OUTPUT}"
        echo "Extracted image refs:"
        echo "${REFS}" | jq -r '.[]'
