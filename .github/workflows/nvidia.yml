name: Nvidia Image Build

on:
  pull_request:
    paths:
      - ".github/workflows/nvidia.yml"
      - "official-templates/nvidia-*/**"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-nvidia:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    outputs:
      image-refs: ${{ steps.refs.outputs.refs }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      
      - name: Setup Docker
        uses: ./.github/actions/docker-setup
        id: setup
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build nvidia images
        id: build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584
        env:
          BUILDX_BAKE_ENTITLEMENTS_FS: 0
          RELEASE_SUFFIX: ${{ steps.setup.outputs.release-suffix }}
        with:
          source: .
          files: |
            official-templates/shared/versions.hcl
            official-templates/nvidia-pytorch/docker-bake.hcl
          load: true
          push: false
      
      - name: Extract image refs
        id: refs
        uses: ./.github/actions/image-name
        with:
          bake-metadata: ${{ steps.build.outputs.metadata }}

      - name: Grype scan
        uses: ./.github/actions/grype
        with:
          image-refs: ${{ steps.refs.outputs.refs }}

      - name: Push images
        uses: ./.github/actions/docker-push
        with:
          image-refs: ${{ steps.refs.outputs.refs }}
          ref-digests: ${{ steps.refs.outputs.ref-digests }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v2.6.0

      - name: Cosign sign and verify
        uses: ./.github/actions/cosign
        with:
          image-digests: ${{ steps.refs.outputs.digests }}

  test-nvidia:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: build-nvidia
    if: needs.build-nvidia.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Smoke test
        uses: ./.github/actions/smoke-test
        with:
          image-refs: ${{ needs.build-nvidia.outputs.image-refs }}
          profile: gpu
          runpod-api-key: ${{ secrets.TESTING_RUNPOD_API_KEY }}
          ssh-private-key: ${{ secrets.TESTING_RUNPOD_SSH_PRIVATE_KEY }}
          # NGC nvidia-pytorch:25.11 ships torch built against CUDA 13.0
          # and refuses to initialise on hosts whose driver only supports
          # CUDA 12.x (`torch.cuda.is_available() == False` with the message
          # 'NVIDIA driver on your system is too old (found version 12080)').
          # The image tag (`-25.11`) has no embedded CUDA marker, so we
          # have to tell the smoke-test composite action the floor
          # explicitly; it propagates this as `min_cuda_version` in the
          # generated manifest and test_images.py forwards it to
          # `runpodctl --min-cuda-version` so the scheduler avoids
          # 570.x-driver hosts (older L4 / RTX 2000 Ada DCs).
          min-cuda-version: "13.0"
