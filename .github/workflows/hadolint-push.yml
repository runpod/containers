name: Hadolint-Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: official-templates/base/Dockerfile
            ignore: DL3006,DL3008,DL3013,DL3022
          - dockerfile: official-templates/pytorch/Dockerfile
            ignore: "DL3013,DL3006"
          - dockerfile: official-templates/autoresearch/Dockerfile
            ignore: "DL3006"
          - dockerfile: helper-templates/verify-nccl/Dockerfile
            ignore: "DL3008"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: ./.github/actions/hadolint
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning
          format: sarif
          output-file: hadolint.sarif
      
      - name: Upload Hadolint SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ strategy.job-index }}