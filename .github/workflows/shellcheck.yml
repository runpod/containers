name: Shellcheck

on:
  pull_request:
    paths:
      - "container-template/*.sh"
      - "helper-templates/**/*.sh"
      - "scripts/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
