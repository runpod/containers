name: Shellcheck

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shellcheck
        uses: reviewdog/action-shellcheck@v1.32.0
        with:
          fail_level: warning